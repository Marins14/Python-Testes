apiVersion: apps/v1
kind: Deployment
metadata:
  name: locadora-api
  namespace: locadora

spec:
  replicas: 2

  selector:
    matchLabels:
      app: locadora-api

  template:
    metadata:
      labels:
        app: locadora-api

    spec:
      containers:
      - name: locadora-api
        image: marins14/locadora-api:1.0

        ports:
        - containerPort: 8000

        env:
        - name: POSTGRES_HOST
          value: postgres

        - name: POSTGRES_PORT
          value: "5432"

        - name: POSTGRES_DB
          value: projeto

        - name: POSTGRES_USER
          value: appuser    

        - name: POSTGRES_PASSWORD
          value: appuser