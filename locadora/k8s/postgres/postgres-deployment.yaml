apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: locadora

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: locadora-config
                  key: POSTGRES_DB

          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc