name: Locadora Virtual

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      working-directory: locadora
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint code
      working-directory: locadora
      run: |
        pip install flake8
        flake8 app

    - name: Run tests
      working-directory: locadora
      run: |
        pip install pytest
        pytest

    - name: Run Black
      working-directory: locadora
      run: |
          pip install black
          black --check .

    - name: Build Docker Image
      working-directory: locadora
      run: |
        docker build -t locadora_virtual:1.0.0 .